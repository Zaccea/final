<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumblr Feed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      box-sizing: border-box;
      background: transparent;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      max-width: 100%;
    }

    img, video, iframe {
      max-width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>
  <script src="https://zaccea.tumblr.com/js"></script>
</body>
</html>
