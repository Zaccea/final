<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumblr Feed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      box-sizing: border-box;
      background: transparent;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      max-width: 100%;
    }

    img, video, iframe {
      max-width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>
  <script src="https://zaccea.tumblr.com/js">
  <script>
  function fixTumblrEmbed() {
    document.documentElement.style.overflowX = "hidden";
    document.body.style.overflowX = "hidden";

    document.querySelectorAll("*").forEach(el => {
      el.style.maxWidth = "100%";
      if (el.scrollWidth > document.documentElement.clientWidth) {
        el.style.width = "100%";
      }
    });

    document.querySelectorAll("img, iframe, video").forEach(el => {
      el.style.maxWidth = "100%";
      el.style.height = "auto";
    });
  }

  new MutationObserver(fixTumblrEmbed).observe(document.body, {
    childList: true,
    subtree: true
  });

  window.addEventListener("load", fixTumblrEmbed);
</script>
</body>
</html>
